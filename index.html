<!DOCTYPE  html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zone Zone</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .logo {
      font-size: 60px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 8px;
      text-align: center;
    }

    p {
      font-size: 14px;
      opacity: 0.6;
      margin-bottom: 32px;
      text-align: center;
    }

    .card {
      width: 100%;
      max-width: 360px;
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
      border: 2px solid transparent;
    }

    .card:active {
      transform: scale(0.97);
      opacity: 0.85;
    }

    .card-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .card-desc {
      font-size: 13px;
      opacity: 0.6;
      margin-bottom: 14px;
    }

    .card-price {
      display: inline-block;
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #ffffff);
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 15px;
      font-weight: bold;
    }

    .success {
      display: none;
      text-align: center;
      padding: 20px;
    }

    .success-icon {
      font-size: 60px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>

  <div id="main">
    <div class="logo">🌟</div>
    <h1>Zone Zone</h1>
    <p>اختر نوع الاشتراك المناسب لك</p>

    <div class="card" onclick="pay(250, 'مقاطع حصرية', 'subscription_exclusive')">
      <div class="card-title">🎬 مقاطع حصرية</div>
      <div class="card-desc">اشتراك شهري — وصول كامل للمحتوى الحصري</div>
      <div class="card-price">⭐ 250 نجمة</div>
    </div>

    <div class="card" onclick="pay(300, 'مقاطع صغار', 'subscription_kids')">
      <div class="card-title">👶 مقاطع صغار</div>
      <div class="card-desc">اشتراك شهري — محتوى مخصص للأطفال</div>
      <div class="card-price">⭐ 300 نجمة</div>
    </div>
  </div>

  <div class="success" id="success">
    <div class="success-icon">✅</div>
    <h1>تم الإرسال!</h1>
    <p>جاري معالجة طلبك...</p>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    function pay(amount, title, payload) {
      document.getElementById('main').style.display = 'none';
      document.getElementById('success').style.display = 'block';

      tg.sendData(JSON.stringify({
        amount: amount,
        title: title,
        payload: payload
      }));
    }
  </script>

</body>
</html>
